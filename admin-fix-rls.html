<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin RLS Fix - 1 HUNDRED</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #f5f5f5;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .container {
                background: white;
                border-radius: 12px;
                padding: 40px;
                max-width: 600px;
                width: 100%;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            }
            h1 {
                font-size: 24px;
                margin-bottom: 10px;
                color: #111;
            }
            p {
                color: #666;
                margin-bottom: 30px;
                line-height: 1.6;
            }
            .status {
                padding: 16px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-size: 14px;
                display: none;
            }
            .status.pending {
                display: block;
                background: #f0f0f0;
                color: #666;
            }
            .status.success {
                display: block;
                background: #d4edda;
                color: #155724;
            }
            .status.error {
                display: block;
                background: #f8d7da;
                color: #721c24;
            }
            .status.info {
                display: block;
                background: #d1ecf1;
                color: #0c5460;
            }
            button {
                width: 100%;
                padding: 14px 24px;
                background: #111;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.2s;
            }
            button:hover:not(:disabled) {
                background: #333;
            }
            button:disabled {
                background: #ccc;
                cursor: not-allowed;
            }
            .log {
                margin-top: 20px;
                padding: 16px;
                background: #f8f9fa;
                border-radius: 8px;
                font-family: monospace;
                font-size: 12px;
                max-height: 300px;
                overflow-y: auto;
                display: none;
            }
            .log.show {
                display: block;
            }
            .log-entry {
                margin-bottom: 8px;
                padding-bottom: 8px;
                border-bottom: 1px solid #e0e0e0;
            }
            .log-entry:last-child {
                border-bottom: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🔧 Fix Admin RLS Policies</h1>
            <p>
                This will update your Supabase RLS (Row Level Security) policies to allow the admin panel to upload
                images and manage products.
            </p>

            <div id="status" class="status pending">Click the button below to apply the fixes.</div>

            <button id="fixBtn" onclick="applyFixes()">Apply RLS Fixes</button>

            <div id="log" class="log"></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
        <script>
            const SUPABASE_URL = 'https://wsgbnfoazvdkxpdqwgyo.supabase.co';
            const SUPABASE_ANON_KEY =
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZ2JuZm9henZka3hwZHF3Z3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDY4MTMsImV4cCI6MjA5MDEyMjgxM30.YUl4-O9q39Wn5xqUjp8S1F8VmTQH76PTIcQGpnrHXNE';

            const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const statusEl = document.getElementById('status');
            const logEl = document.getElementById('log');
            const fixBtn = document.getElementById('fixBtn');

            function log(message, type = 'info') {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${message}`;
                logEl.appendChild(entry);
                logEl.classList.add('show');
                logEl.scrollTop = logEl.scrollHeight;
                console.log(`[${type}] ${message}`);
            }

            function setStatus(message, type) {
                statusEl.textContent = message;
                statusEl.className = `status ${type}`;
            }

            async function applyFixes() {
                fixBtn.disabled = true;
                setStatus('Applying RLS fixes...', 'info');
                logEl.innerHTML = '';

                try {
                    // Step 1: Enable RLS on products table
                    log('Step 1: Enabling RLS on products table...');
                    const { error: rlsError } = await supabase.rpc('exec_sql', {
                        sql: 'ALTER TABLE products ENABLE ROW LEVEL SECURITY;'
                    });
                    if (rlsError) {
                        log(`Note: ${rlsError.message}`, 'warn');
                    } else {
                        log('✓ RLS enabled on products');
                    }

                    // Step 2: Create INSERT policy
                    log('Step 2: Creating INSERT policy...');
                    const { error: insertError } = await supabase.rpc('exec_sql', {
                        sql: `
                        DROP POLICY IF EXISTS "Allow anonymous insert" ON products;
                        CREATE POLICY "Allow anonymous insert" ON products 
                        FOR INSERT WITH CHECK (true);
                    `
                    });
                    if (insertError) throw new Error(`INSERT policy failed: ${insertError.message}`);
                    log('✓ INSERT policy created');

                    // Step 3: Create UPDATE policy
                    log('Step 3: Creating UPDATE policy...');
                    const { error: updateError } = await supabase.rpc('exec_sql', {
                        sql: `
                        DROP POLICY IF EXISTS "Allow anonymous update" ON products;
                        CREATE POLICY "Allow anonymous update" ON products 
                        FOR UPDATE USING (true);
                    `
                    });
                    if (updateError) throw new Error(`UPDATE policy failed: ${updateError.message}`);
                    log('✓ UPDATE policy created');

                    // Step 4: Create DELETE policy
                    log('Step 4: Creating DELETE policy...');
                    const { error: deleteError } = await supabase.rpc('exec_sql', {
                        sql: `
                        DROP POLICY IF EXISTS "Allow anonymous delete" ON products;
                        CREATE POLICY "Allow anonymous delete" ON products 
                        FOR DELETE USING (true);
                    `
                    });
                    if (deleteError) throw new Error(`DELETE policy failed: ${deleteError.message}`);
                    log('✓ DELETE policy created');

                    // Step 5: Create SELECT policy
                    log('Step 5: Creating SELECT policy...');
                    const { error: selectError } = await supabase.rpc('exec_sql', {
                        sql: `
                        DROP POLICY IF EXISTS "Allow anonymous read" ON products;
                        CREATE POLICY "Allow anonymous read" ON products 
                        FOR SELECT USING (true);
                    `
                    });
                    if (selectError) throw new Error(`SELECT policy failed: ${selectError.message}`);
                    log('✓ SELECT policy created');

                    // Step 6: Fix storage policies
                    log('Step 6: Fixing storage RLS policies...');
                    const { error: storageError } = await supabase.rpc('exec_sql', {
                        sql: `
                        -- Enable RLS on storage
                        ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;
                        
                        -- Drop existing policies
                        DROP POLICY IF EXISTS "Allow anonymous insert product-images" ON storage.objects;
                        DROP POLICY IF EXISTS "Allow anonymous update product-images" ON storage.objects;
                        DROP POLICY IF EXISTS "Allow anonymous delete product-images" ON storage.objects;
                        DROP POLICY IF EXISTS "Allow anonymous read product-images" ON storage.objects;
                        
                        -- Create new policies
                        CREATE POLICY "Allow anonymous read product-images" ON storage.objects
                            FOR SELECT USING (bucket_id = 'product-images');
                        CREATE POLICY "Allow anonymous insert product-images" ON storage.objects
                            FOR INSERT WITH CHECK (bucket_id = 'product-images');
                        CREATE POLICY "Allow anonymous update product-images" ON storage.objects
                            FOR UPDATE USING (bucket_id = 'product-images');
                        CREATE POLICY "Allow anonymous delete product-images" ON storage.objects
                            FOR DELETE USING (bucket_id = 'product-images');
                    `
                    });
                    if (storageError) {
                        log(`Storage policy warning: ${storageError.message}`, 'warn');
                    } else {
                        log('✓ Storage policies created');
                    }

                    // Step 7: Test the connection
                    log('Step 7: Testing connection...');
                    const { data: testData, error: testError } = await supabase.from('products').select('id').limit(1);

                    if (testError) {
                        log(`Test warning: ${testError.message}`, 'warn');
                    } else {
                        log('✓ Database connection working');
                    }

                    setStatus(
                        '✅ All RLS fixes applied successfully! You can now close this page and use the admin panel.',
                        'success'
                    );
                    log('All fixes applied successfully!', 'success');
                } catch (err) {
                    setStatus(`❌ Error: ${err.message}`, 'error');
                    log(`Error: ${err.message}`, 'error');

                    if (err.message.includes('exec_sql') || err.message.includes('function')) {
                        log('', 'info');
                        log('The exec_sql function is not available. You need to run the SQL manually.', 'info');
                        log(
                            'Open this SQL file and run it in Supabase SQL Editor: supabase-admin-rls-fix.sql.txt',
                            'info'
                        );
                    }
                } finally {
                    fixBtn.disabled = false;
                }
            }
        </script>
    </body>
</html>
