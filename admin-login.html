<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <script src="/gate.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Login | 1HundredOrNothing</title>
        <meta name="description" content="Admin access for 1 HUNDRED store management." />
        <meta name="robots" content="noindex, nofollow" />

        <link rel="stylesheet" href="tailwind.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap"
            rel="stylesheet" />
        <script src="https://unpkg.com/lucide@0.469.0"></script>
        <link rel="stylesheet" href="styles.css" />
        <style>
            .admin-login-container {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #111111 0%, #333333 100%);
                padding: 2rem 1rem;
            }
            .admin-login-box {
                width: 100%;
                max-width: 420px;
                background: var(--white);
                padding: 3rem;
            }
            .admin-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                background: #111;
                color: white;
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                margin-bottom: 1.5rem;
            }
            .admin-title {
                font-family: 'Oswald', sans-serif;
                font-size: 2rem;
                font-weight: 700;
                text-transform: uppercase;
                margin-bottom: 0.5rem;
            }
            .admin-subtitle {
                color: var(--brand-mid-grey);
                margin-bottom: 2rem;
                font-size: 0.875rem;
            }
            .error-message {
                background: #fef2f2;
                border: 1px solid #fecaca;
                color: #dc2626;
                padding: 0.75rem 1rem;
                margin-bottom: 1rem;
                font-size: 0.875rem;
                display: none;
            }
            .error-message.show {
                display: block;
            }
            .back-link {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                color: var(--brand-mid-grey);
                font-size: 0.875rem;
                margin-top: 2rem;
                transition: color 0.2s;
            }
            .back-link:hover {
                color: var(--brand-black);
            }
        </style>
    </head>
    <body class="antialiased">
        <div class="admin-login-container">
            <div class="admin-login-box">
                <div class="text-center mb-8">
                    <img src="logo.svg" alt="1 HUNDRED OR NOTHING" class="h-10 mx-auto mb-6" />
                    <div class="admin-badge">
                        <i data-lucide="shield" class="w-4 h-4"></i>
                        Admin Access
                    </div>
                    <h1 class="admin-title">Store Management</h1>
                    <p class="admin-subtitle">Sign in to manage your store</p>
                </div>

                <div id="error-message" class="error-message"></div>

                <form id="admin-login-form">
                    <div class="form-group">
                        <label class="form-label" for="email">Admin Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="Enter your admin email"
                            required
                            autocomplete="email" />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password" />
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Sign In to Admin</button>
                </form>

                <div class="text-center" style="margin-top: 1rem">
                    <a
                        href="#"
                        id="forgot-password"
                        style="color: #666; font-size: 0.875rem; text-decoration: underline; cursor: pointer"
                        >Forgot password?</a
                    >
                </div>
                <div class="text-center" style="margin-top: 1rem">
                    <a href="/" class="back-link">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Back to Store
                    </a>
                </div>
            </div>
        </div>

        <!-- Supabase -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
        <script src="supabase.js"></script>
        <script src="main.js?v=3"></script>
        <script>
            // Admin emails authorized to access the dashboard
            const ADMIN_EMAILS = ['admin@1hundredornothing.co.uk', 'hundredornothing@outlook.com'];

            // Check if already logged in via Supabase Auth
            (async function checkExistingSession() {
                const client = typeof getSupabase === 'function' ? getSupabase() : null;
                if (client) {
                    const {
                        data: { session }
                    } = await client.auth.getSession();
                    if (session && ADMIN_EMAILS.includes(session.user.email.toLowerCase())) {
                        sessionStorage.setItem(
                            '1hundred_admin_session',
                            JSON.stringify({
                                email: session.user.email,
                                timestamp: Date.now(),
                                loggedInAt: new Date().toISOString(),
                                supabaseAuth: true,
                                userId: session.user.id,
                                accessToken: session.access_token,
                                refreshToken: session.refresh_token,
                                expiresAt: session.expires_at
                            })
                        );
                        sessionStorage.setItem('1hundred_gate_auth', 'granted');
                        window.location.href = '/admin';
                        return;
                    }
                }
                // Also check sessionStorage fallback
                const existing = sessionStorage.getItem('1hundred_admin_session');
                if (existing) {
                    try {
                        const s = JSON.parse(existing);
                        if (s.email && s.timestamp && Date.now() - s.timestamp < 4 * 60 * 60 * 1000) {
                            window.location.href = '/admin';
                            return;
                        }
                    } catch (e) {}
                }
            })();

            document.getElementById('admin-login-form').addEventListener('submit', async function (e) {
                e.preventDefault();

                const email = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('error-message');
                const submitBtn = this.querySelector('button[type="submit"]');

                // Check if email is in admin whitelist
                if (!ADMIN_EMAILS.includes(email)) {
                    errorDiv.textContent = 'This email is not authorized for admin access';
                    errorDiv.classList.add('show');
                    return;
                }

                // Show loading
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Signing in...';
                }
                errorDiv.classList.remove('show');

                // Supabase Auth is the only supported login path — no hardcoded fallback
                const client = typeof getSupabase === 'function' ? getSupabase() : null;
                if (!client) {
                    errorDiv.textContent = 'Auth system unavailable. Please refresh and try again.';
                    errorDiv.classList.add('show');
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Sign In';
                    }
                    return;
                }

                try {
                    const { data, error } = await client.auth.signInWithPassword({ email, password });

                    if (error || !data?.session) {
                        errorDiv.textContent =
                            error && error.message === 'Invalid login credentials'
                                ? 'Invalid email or password'
                                : (error && error.message) || 'Sign in failed';
                        errorDiv.classList.add('show');
                        if (submitBtn) {
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Sign In';
                        }
                        return;
                    }

                    // Persist the Supabase JWT so admin.js can send it with /api/admin/* calls
                    sessionStorage.setItem(
                        '1hundred_admin_session',
                        JSON.stringify({
                            email: data.user.email,
                            timestamp: Date.now(),
                            loggedInAt: new Date().toISOString(),
                            supabaseAuth: true,
                            userId: data.user.id,
                            accessToken: data.session.access_token,
                            refreshToken: data.session.refresh_token,
                            expiresAt: data.session.expires_at
                        })
                    );
                    sessionStorage.setItem('1hundred_gate_auth', 'granted');
                    window.location.href = '/admin';
                } catch (err) {
                    errorDiv.textContent = 'Sign in failed. Please try again.';
                    errorDiv.classList.add('show');
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Sign In';
                    }
                }
            });

            // Forgot password handler
            document.getElementById('forgot-password')?.addEventListener('click', async function (e) {
                e.preventDefault();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const errorDiv = document.getElementById('error-message');

                if (!email) {
                    errorDiv.textContent = 'Please enter your email address first';
                    errorDiv.classList.add('show');
                    return;
                }

                if (!ADMIN_EMAILS.includes(email)) {
                    errorDiv.textContent = 'This email is not authorized for admin access';
                    errorDiv.classList.add('show');
                    return;
                }

                const client = typeof getSupabase === 'function' ? getSupabase() : null;
                if (client) {
                    const { error } = await client.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/admin-login'
                    });
                    if (!error) {
                        if (typeof showToast !== 'undefined')
                            showToast('Password reset email sent! Check your inbox.', 'success');
                        else alert('Password reset email sent! Check your inbox.');
                    } else {
                        errorDiv.textContent = error.message;
                        errorDiv.classList.add('show');
                    }
                }
            });
        </script>
    </body>
</html>
